  color: #b8cef0;
  margin-top: 0;

  letter-spacing: .03em;
  text-transform: uppercase;
}

<h1 id="pwa--offline-first">PWA — Offline First</h1>
<div class="two-col">
<div>
<h3 id="caratteristiche-pwa">Caratteristiche PWA</h3>
<ul>
<li><strong>Service Worker</strong>: caching automatico build + assets</li>
<li><strong>IndexedDB (Dexie)</strong>: database locale completo</li>
<li><strong>Installabile</strong>: icona su home screen Android/desktop</li>
<li><strong>Manifest</strong>: nome, icone, colori, orientamento</li>
<li><strong>Aggiornamento</strong>: chunk-load error recovery</li>
</ul>
</div>
<div class="card">
<h3 id="perch%C3%A9-offline-first">Perché Offline-First</h3>
<blockquote>
<p>In una RSA la connettività non è garantita. L'app deve funzionare sempre, anche senza rete.</p>
</blockquote>
<ul>
<li><strong>Nessuna interruzione</strong> durante visita ai pazienti</li>
<li><strong>Sync automatico</strong> quando torna la connessione</li>
<li><strong>Nessuna perdita dati</strong>: tutto salvato localmente prima del sync</li>
</ul>
</div>
</div>
<footer>MediTrace — Gestione farmaci per RSA</footer>
