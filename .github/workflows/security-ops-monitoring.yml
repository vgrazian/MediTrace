name: Security And Credential Monitoring

on:
  schedule:
    - cron: '0 7 * * 1'
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  monthly-rotation-reminder:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly credential rotation reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10)
            const owner = context.repo.owner
            const repo = context.repo.repo
            const title = `[Security] Monthly credential rotation reminder - ${today}`

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })

            const alreadyOpen = openIssues.data.some(issue => issue.title.startsWith('[Security] Monthly credential rotation reminder'))
            if (alreadyOpen) {
              core.info('Rotation reminder issue already open. Skipping creation.')
              return
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body: [
                'Checklist rotazione credenziali operative:',
                '- Verificare scadenza/rinnovo segreto tecnico GitHub per sync',
                '- Verificare policy password utenze operative',
                '- Revocare segreti obsoleti',
                '- Aggiornare evidenze operative in docs/security-secrets-policy.md',
              ].join('\n'),
            })
