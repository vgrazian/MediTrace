name: Online Main Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  online-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash pwa/scripts/smoke-pages.sh "https://vgrazian.github.io/MediTrace/"
        env:
          SITE_URL: https://vgrazian.github.io/MediTrace/

  online-reset-password:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
        working-directory: pwa
      - run: node scripts/online-reset-password.mjs "https://vgrazian.github.io/MediTrace/"
        working-directory: pwa
        env:
          SITE_URL: https://vgrazian.github.io/MediTrace/
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: online-reset-password-report
          path: pwa/online-reset-password.json
          retention-days: 7
