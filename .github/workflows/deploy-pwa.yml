name: Deploy PWA su GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/deploy-pwa.yml'
      - 'pwa/scripts/smoke-pages.sh'
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: 'Git ref/sha da deployare (default: branch che avvia il workflow)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build PWA
    runs-on: ubuntu-latest
    outputs:
      deployed_ref: ${{ steps.resolve_ref.outputs.deployed_ref }}
    defaults:
      run:
        working-directory: pwa
    steps:
      - name: Resolve deploy ref
        id: resolve_ref
        working-directory: ${{ github.workspace }}
        run: |
          REF="${{ inputs.deploy_ref || github.sha }}"
          echo "deployed_ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.deployed_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Must match the GitHub Pages base path: /<repo-name>/
          VITE_BASE_URL: /MediTrace/
          # Optional: configure in repository Variables to enable reset password via Supabase on Pages
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_REDIRECT_TO: ${{ vars.VITE_SUPABASE_REDIRECT_TO || 'https://vgrazian.github.io/MediTrace/#/auth/reset-password' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pwa/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    name: Smoke test deployed Pages
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.deployed_ref }}

      - name: Run GitHub Pages smoke checks
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          chmod +x pwa/scripts/smoke-pages.sh
          pwa/scripts/smoke-pages.sh "$SITE_URL"
