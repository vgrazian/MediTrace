name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write keep-alive timestamp
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Writing keep-alive timestamp: $NOW"

          # UPSERT into sync_files: set name='_keep_alive' with the current timestamp
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ vars.VITE_SUPABASE_URL }}/rest/v1/sync_files" \
            -H "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "[{\"name\":\"_keep_alive\",\"updated_at\":\"$NOW\",\"payload\":{\"last_ping\":\"$NOW\"}}]")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Write failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ Write OK (HTTP $HTTP_CODE)"

      - name: Read back keep-alive timestamp
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET "${{ vars.VITE_SUPABASE_URL }}/rest/v1/sync_files?name=eq._keep_alive&select=name,updated_at&limit=1" \
            -H "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Read failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ Read-back OK: $BODY"
          echo "$BODY" | grep -q "_keep_alive" && echo "✅ Keep-alive verified" || (echo "❌ Verification failed" && exit 1)
