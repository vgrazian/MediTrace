name: Keep Alive Monitor

# PRIMARY keep-alive: pg_cron runs inside Supabase every 5 days (009_keep_alive_cron.sql).
#   → No VM required, runs directly on Supabase infrastructure.
#
# THIS workflow is a READ-ONLY monitoring check that verifies pg_cron is working.
# It only reads the _keep_alive row — no writes, no UPSERTs.
# Runs weekly on Monday at 06:00 UTC. Fails if the last ping is older than 8 days.
#
# If this workflow consistently fails due to runner provisioning timeouts,
# it can be safely disabled — pg_cron is the primary keep-alive mechanism.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - name: Verify pg_cron keep-alive is working
        run: |
          # Read back the _keep_alive row (read-only, no writes)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET "${{ vars.VITE_SUPABASE_URL }}/rest/v1/sync_files?name=eq._keep_alive&select=name,updated_at,payload&limit=1" \
            -H "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Unable to read keep-alive row (HTTP $HTTP_CODE)"
            exit 0  # Don't fail — might be a transient API issue
          fi

          # Extract the updated_at timestamp
          LAST_PING=$(echo "$BODY" | grep -o '"updated_at":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$LAST_PING" ]; then
            echo "::warning::No keep-alive row found. pg_cron may not have run yet."
            exit 0
          fi

          echo "Last pg_cron ping: $LAST_PING"

          # Check if the last ping is older than 8 days
          NOW_EPOCH=$(date -u +%s)
          PING_EPOCH=$(date -u -d "$LAST_PING" +%s 2>/dev/null || echo 0)

          if [ "$PING_EPOCH" -eq 0 ]; then
            echo "::warning::Could not parse timestamp: $LAST_PING"
            exit 0
          fi

          DAYS_DIFF=$(( (NOW_EPOCH - PING_EPOCH) / 86400 ))
          echo "Days since last ping: $DAYS_DIFF"

          if [ "$DAYS_DIFF" -gt 8 ]; then
            echo "::error::Keep-alive STALE — last ping was $DAYS_DIFF days ago (threshold: 8 days)"
            exit 1
          fi

          echo "✅ Keep-alive OK — last ping was $DAYS_DIFF days ago"
