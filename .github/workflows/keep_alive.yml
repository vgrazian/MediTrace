name: Keep Supabase Alive

on:
  schedule:
    # Run at midnight UTC on Sunday (0) and Thursday (4)
    # Twice a week ensures the DB never reaches the 7-day inactivity threshold
    - cron: '0 0 * * 0,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/sync_files?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
