name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
        working-directory: pwa
      - run: npm run test:unit
        working-directory: pwa
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
        working-directory: pwa
      - run: npm run build
        working-directory: pwa
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}
          VITE_AXIOM_TOKEN: ${{ secrets.VITE_AXIOM_TOKEN || '' }}
          VITE_AXIOM_EDGE_URL: ${{ vars.VITE_AXIOM_EDGE_URL || '' }}
          VITE_AXIOM_DATASET: ${{ vars.VITE_AXIOM_DATASET || 'meditrace' }}
          VITE_AXIOM_ENCRYPTION_SALT: ${{ vars.VITE_AXIOM_ENCRYPTION_SALT || '' }}
          VITE_AXIOM_ENCRYPTION_PASSPHRASE: ${{ secrets.VITE_AXIOM_ENCRYPTION_PASSPHRASE || '' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-dist
          path: pwa/dist/
          retention-days: 7
